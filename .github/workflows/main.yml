# ============================================================
#  GitHub Actions CI/CD Workflow
#  Placement Predictor — Full Stack Web Application
#
#  Environments:
#    ci          → sandbox secrets (Docker Postgres, CI-only key)
#    production  → real secrets (Supabase, Render deploy hook)
#
#  Triggers: push/PR on main branch
# ============================================================

name: CI — Build, Test & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ============================================================
#  JOBS
# ============================================================
jobs:

  # ────────────────────────────────────────────────────────
  # JOB 1: Frontend — Install, Lint, Build
  # ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # JOB 2: Backend — Unit tests against sandbox Docker DB
  # environment: ci  →  uses ci environment secrets
  # ────────────────────────────────────────────────────────
  backend:
    name: Backend (FastAPI + Python 3.11)
    runs-on: ubuntu-latest
    environment: ci

    defaults:
      run:
        working-directory: backend

    # Sandbox PostgreSQL — stays local to this job, never prod
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: placement_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Points to the sandbox service container above — NOT the ci environment secret
      DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/placement_db
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install openpyxl pytest httpx psycopg2-binary

      - name: Apply schema.sql to sandbox DB
        run: PGPASSWORD=mypassword psql -h localhost -U myuser -d placement_db -f schema.sql

      - name: Validate app starts (import check)
        run: python -c "from app.main import app; print('App loaded successfully')"

      - name: Generate DAST Excel report
        run: python automated_test/generate_excel_report.py || true

      - name: Upload DAST report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dast-security-report
          path: backend/automated_test/DAST_Security_Report_v2.xlsx
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # JOB 3: Security Scan — Hardcoded Secrets Check
  # ────────────────────────────────────────────────────────
  security-scan:
    name: Security — Secret & Credential Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for secret scanning

      - name: Check for .env files committed
        run: |
          if git ls-tree -r --name-only HEAD | grep -E '^(\.env|.*\.env\..*|\.env\..*)$'; then
            echo "::error:: .env file found in repository! Remove it and rotate secrets."
            exit 1
          else
            echo "✓ No .env files committed"
          fi

      - name: Check for default/weak secret keys
        run: |
          if grep -r "your-super-secret-key-change-in-production" --include="*.py" backend/; then
            echo "::warning:: Default SECRET_KEY detected in source code. Replace with a random key in production."
          else
            echo "✓ No default secret key found in source"
          fi

  # ────────────────────────────────────────────────────────
  # JOB 4: E2E Sandbox Tests (Docker Compose full stack)
  # environment: ci  →  uses ci environment secrets
  # ────────────────────────────────────────────────────────
  e2e-sandbox:
    name: E2E Tests (Sandbox Environment)
    runs-on: ubuntu-latest
    environment: ci
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package-lock.json

      - name: Create backend .env for Docker Compose sandbox
        run: |
          # DATABASE_URL points to the 'db' Docker Compose service (not localhost)
          echo "DATABASE_URL=postgresql://myuser:mypassword@db:5432/placement_db" > backend/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> backend/.env
          echo "ALGORITHM=HS256" >> backend/.env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> backend/.env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> backend/.env
          echo "ENVIRONMENT=ci" >> backend/.env

      - name: Start Sandbox Environment (Docker Compose)
        run: |
          docker compose up -d
          # Wait for backend healthcheck to pass (max 90s)
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' local_fastapi_backend 2>/dev/null || echo "starting")
            echo "  Backend status: $STATUS ($i/18)"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy!"
              break
            fi
            sleep 5
          done

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Start Frontend in Background
        working-directory: frontend
        run: npm run dev &

      - name: Wait for Frontend to be ready
        run: |
          echo "Waiting for frontend (port 5173)..."
          for i in $(seq 1 12); do
            curl -s http://localhost:5173 > /dev/null && echo "Frontend ready!" && break
            sleep 5
          done

      - name: Install Test Dependencies
        working-directory: tests
        run: npm install

      - name: Run E2E Tests
        working-directory: tests
        run: npm test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: Test_Results_Summary.xlsx
          retention-days: 7

      - name: Docker Compose logs on failure
        if: failure()
        run: docker compose logs

  # ────────────────────────────────────────────────────────
  # JOB 5: Deploy to Production (Render)
  # environment: production  →  uses production secrets
  # Runs ONLY on push to main (not PRs), after CI passes
  # ────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Render (Production)
    runs-on: ubuntu-latest
    environment: production
    needs: [frontend, backend, security-scan, e2e-sandbox]
    # Only deploy on direct push to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering Render deployment..."
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP status: %{http_code}\n"
          echo "Render deploy triggered successfully."

  # ────────────────────────────────────────────────────────
  # JOB 6: Summary — Report Status
  # ────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-scan, e2e-sandbox]
    if: always()

    steps:
      - name: Print status
        run: |
          echo "============================================="
          echo "  Placement Predictor — CI Summary"
          echo "============================================="
          echo "  Frontend Build : ${{ needs.frontend.result }}"
          echo "  Backend Check  : ${{ needs.backend.result }}"
          echo "  Security Scan  : ${{ needs.security-scan.result }}"
          echo "  E2E Sandbox    : ${{ needs.e2e-sandbox.result }}"
          echo "============================================="
