name: Mobile E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mobile-e2e:
    # macos-15 = Apple Silicon M-series runner (hardware-accelerated Android emulator)
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ─── Docker via Colima (QEMU – works without special entitlements) ──────────
      - name: Install Docker runtime (Colima + QEMU)
        run: |
          brew install docker docker-compose colima qemu
          # Register the docker-compose CLI plugin so `docker compose` works
          mkdir -p ~/.docker/cli-plugins
          ln -sfn /opt/homebrew/opt/docker-compose/bin/docker-compose ~/.docker/cli-plugins/docker-compose

      - name: Start Colima with QEMU (not VZ)
        run: |
          # --vm-type=qemu avoids the VZ Virtualization Framework which fails on GHA
          colima start \
            --vm-type=qemu \
            --cpu 2 \
            --memory 4 \
            --disk 20 \
            --network-address
          docker info

      # ─── Backend services ────────────────────────────────────────────────────────
      - name: Create backend .env
        run: |
          echo "DATABASE_URL=postgresql://myuser:mypassword@db:5432/placement_db" > backend/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> backend/.env
          echo "ALGORITHM=HS256" >> backend/.env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> backend/.env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> backend/.env
          echo "ENVIRONMENT=ci" >> backend/.env

      - name: Start Docker services (db + backend)
        run: |
          docker compose up -d db backend
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "✅ Backend is up after ${i}s"
              break
            fi
            echo "  attempt $i/30 – not ready yet…"
            sleep 5
          done

      # ─── Mobile build ────────────────────────────────────────────────────────────
      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Build Web Assets (Vite)
        working-directory: ./mobile
        run: |
          # In the Android emulator, localhost inside the WebView resolves to 10.0.2.2
          echo "VITE_API_URL=http://10.0.2.2:8000" > .env.production
          npm run build

      - name: Sync Capacitor Android project
        working-directory: ./mobile
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Build Android APK (debug)
        working-directory: ./mobile/android
        run: ./gradlew assembleDebug --no-daemon

      # ─── Appium ─────────────────────────────────────────────────────────────────
      - name: Install Appium + UiAutomator2
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Start Appium server (background)
        run: |
          appium --log-level warn &
          # Give Appium time to bind its port
          sleep 5
          curl -sf http://127.0.0.1:4723/status | python3 -c "import sys,json; d=json.load(sys.stdin); print('Appium ready:', d['value']['ready'])"

      # ─── Install test deps ───────────────────────────────────────────────────────
      - name: Install E2E test dependencies
        working-directory: ./mobile/tests
        run: npm install

      # ─── Android emulator + run tests ────────────────────────────────────────────
      - name: Run Appium E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          # Disable window animation so Appium interactions are more reliable
          disable-animations: true
          script: |
            echo "Emulator is booted. Running Appium E2E tests..."
            cd mobile/tests
            npm test

      # ─── Upload results ──────────────────────────────────────────────────────────
      - name: Upload Mobile Test Report (Excel)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Test-Report-${{ github.run_number }}
          path: mobile/tests/Mobile_Test_Results_Summary.xlsx

      - name: Upload Appium Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Logs-${{ github.run_number }}
          path: ~/.appium/logs/
