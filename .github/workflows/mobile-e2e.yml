name: Mobile E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mobile-e2e:
    # macos-15 = Apple Silicon M-series runner (hardware-accelerated Android emulator)
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ─── PostgreSQL (native – no Docker/VM needed) ───────────────────────────────
      - name: Install and start PostgreSQL 15
        run: |
          brew install postgresql@15
          brew services start postgresql@15
          # Wait for postgres to be ready
          for i in $(seq 1 15); do
            if /opt/homebrew/opt/postgresql@15/bin/pg_isready -q; then
              echo "✅ PostgreSQL is ready"
              break
            fi
            echo "  waiting for postgres... ($i/15)"
            sleep 2
          done

      - name: Create database user and schema
        run: |
          # The brew-installed postgres runs as the current user (runner), so we
          # use that superuser to create our app user and database
          /opt/homebrew/opt/postgresql@15/bin/psql postgres -c "CREATE USER myuser WITH PASSWORD 'mypassword';"
          /opt/homebrew/opt/postgresql@15/bin/psql postgres -c "CREATE DATABASE placement_db OWNER myuser;"
          /opt/homebrew/opt/postgresql@15/bin/psql postgres -c "GRANT ALL PRIVILEGES ON DATABASE placement_db TO myuser;"

      # ─── FastAPI backend (native Python) ─────────────────────────────────────────
      - name: Create backend .env
        run: |
          echo "DATABASE_URL=postgresql://myuser:mypassword@localhost:5432/placement_db" > backend/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> backend/.env
          echo "ALGORITHM=HS256" >> backend/.env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> backend/.env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> backend/.env
          echo "ENVIRONMENT=ci" >> backend/.env

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r backend/requirements.txt

      - name: Run Alembic migrations
        working-directory: ./backend
        run: |
          alembic upgrade head

      - name: Start FastAPI backend (background)
        working-directory: ./backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "✅ Backend is up after attempt $i"
              break
            fi
            echo "  attempt $i/20 – not ready yet..."
            sleep 3
          done

      # ─── Mobile build ────────────────────────────────────────────────────────────
      - name: Install mobile dependencies
        working-directory: ./mobile
        run: npm install

      - name: Build Web Assets (Vite)
        working-directory: ./mobile
        run: |
          # In the Android emulator, 10.0.2.2 resolves to the host machine
          echo "VITE_API_URL=http://10.0.2.2:8000" > .env.production
          npm run build

      - name: Sync Capacitor Android project
        working-directory: ./mobile
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Build Android APK (debug)
        working-directory: ./mobile/android
        run: ./gradlew assembleDebug --no-daemon

      # ─── Appium ──────────────────────────────────────────────────────────────────
      - name: Install Appium + UiAutomator2
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Start Appium server (background)
        run: |
          appium --log-level warn &
          sleep 5
          curl -sf http://127.0.0.1:4723/status | python3 -c "import sys,json; d=json.load(sys.stdin); print('Appium ready:', d['value']['ready'])"

      # ─── Install test deps ────────────────────────────────────────────────────────
      - name: Install E2E test dependencies
        working-directory: ./mobile/tests
        run: npm install

      # ─── Android emulator + run tests ────────────────────────────────────────────
      - name: Run Appium E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          disable-animations: true
          script: |
            echo "Emulator is booted. Running Appium E2E tests..."
            cd mobile/tests
            npm test

      # ─── Upload results ───────────────────────────────────────────────────────────
      - name: Upload Mobile Test Report (Excel)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Test-Report-${{ github.run_number }}
          path: mobile/tests/Mobile_Test_Results_Summary.xlsx

      - name: Upload Appium Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Logs-${{ github.run_number }}
          path: ~/.appium/logs/
